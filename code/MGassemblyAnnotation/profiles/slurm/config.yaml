executor: slurm
jobs: 50
local-cores: 1
latency-wait: 60
max-jobs-per-second: 5
max-status-checks-per-second: 10
printshellcmds: true
rerun-incomplete: true
keep-going: true

default-resources:
  - slurm_partition=batch
  - nodes=1
  - tasks=1
  - cpus_per_task=1
  - mem_mb=4000
  - runtime=14400

set-resources:
  - annotate_assembly_orfs_pyrodigal:slurm_partition=batch
  - annotate_assembly_orfs_pyrodigal:cpus_per_task=1
  - annotate_assembly_orfs_pyrodigal:mem_mb=4000
  - annotate_assembly_orfs_pyrodigal:runtime=14400